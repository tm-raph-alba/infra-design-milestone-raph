# terraform-plan.yml
# Runs 'terraform plan' on every pull request to main
# Purpose: preview the built infrastructure and catch errors before merging
# Reviewer sees exactly changes that will happen in Azure.
# Authenticated using service principal secrets.

name: Terraform Pan

on:
  pull_request:
    branches: [main]

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    
    # Azurerm provider and backend secrets in Github.
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_admin_source_ip: ${{ secrets.TF_VAR_admin_source_ip }}
      TF_VAR_db_admin_password: ${{ secrets.TF_VAR_db_admin_password }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate
      
      - name: Terraform Plan
        run: terraform plan